<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gotcha! 🧀</title>
    <style>
        /* Insane flashing rainbow background loop */
        @keyframes rainbow {
            0% { background-color: #ff0000; }
            16% { background-color: #ffff00; }
            33% { background-color: #00ff00; }
            50% { background-color: #00ffff; }
            66% { background-color: #0000ff; }
            83% { background-color: #ff00ff; }
            100% { background-color: #ff0000; }
        }

        /* Force fill the display area */
        html, body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            animation: rainbow 0.1s infinite linear; /* Max speed flashing */
            font-family: 'Arial Black', sans-serif;
        }

        /* The container card */
        .card {
            background-color: white;
            padding: 30px;
            border-radius: 20px;
            border: 6px solid black;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 85%;
            width: 320px;
        }

        h1 {
            font-size: 2rem;
            margin: 0 0 20px 0;
            color: black;
        }

        /* Troll face styled using safe CSS shapes */
        .troll-face-fallback {
            width: 150px;
            height: 150px;
            margin: 0 auto;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='45' stroke='black' stroke-width='4' fill='white'/><ellipse cx='35' cy='40' rx='6' ry='10' fill='black'/><ellipse cx='65' cy='40' rx='6' ry='10' fill='black'/><path d='M 25 50 Q 50 25 75 50' stroke='black' stroke-width='4' fill='none'/><path d='M 20 60 Q 50 90 80 60' stroke='black' stroke-width='4' fill='none'/><path d='M 27 63 L 33 63 M 37 66 L 43 66 M 47 67 L 53 67 M 57 66 L 63 66 M 67 63 L 73 63' stroke='black' stroke-width='2'/></svg>");
            background-size: contain;
            background-repeat: no-repeat;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>I WASTED YOUR TIME! 😂</h1>
        <!-- Built-in vector troll face -->
        <div class="troll-face-fallback"></div>
    </div>

</body>
</html>
